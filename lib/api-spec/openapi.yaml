openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sriswa Studio e-commerce API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Product category operations
  - name: products
    description: Product operations
  - name: cart
    description: Cart operations
  - name: orders
    description: Order operations
  - name: admin
    description: Admin operations
  - name: storage
    description: File storage operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── CATEGORIES ────────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── PRODUCTS ──────────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: minPrice
          in: query
          schema:
            type: ["number", "null"]
        - name: maxPrice
          in: query
          schema:
            type: ["number", "null"]
        - name: sortBy
          in: query
          schema:
            type: ["string", "null"]
            enum: ["price_asc", "price_desc", "newest", "name", null]
        - name: featured
          in: query
          schema:
            type: ["boolean", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: getFeaturedProducts
      tags: [products]
      summary: Get featured products for homepage
      parameters:
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/images:
    post:
      operationId: addProductImage
      tags: [products]
      summary: Add product image (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductImageInput"
      responses:
        "201":
          description: Image added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductImage"

  /products/{id}/inventory:
    get:
      operationId: getProductInventory
      tags: [products]
      summary: Get inventory for a product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"
    patch:
      operationId: updateProductInventory
      tags: [products]
      summary: Update stock for a product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"

  # ── CART ──────────────────────────────────────────────────────────────────────
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get cart for current session
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items:
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items/{itemId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/clear:
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear all items from cart
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cleared

  # ── ORDERS ────────────────────────────────────────────────────────────────────
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order (checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
            enum: ["pending", "processing", "shipped", "delivered", "cancelled", null]
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /orders/track:
    get:
      operationId: trackOrder
      tags: [orders]
      summary: Track an order by order number or email
      parameters:
        - name: orderNumber
          in: query
          schema:
            type: ["string", "null"]
        - name: email
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (admin, triggers WhatsApp)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── ADMIN ─────────────────────────────────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Admin dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/inventory/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [admin]
      summary: Products with stock below threshold
      responses:
        "200":
          description: Low stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LowStockItem"

  /admin/inventory:
    get:
      operationId: listInventory
      tags: [admin]
      summary: Full inventory list (admin)
      responses:
        "200":
          description: Inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /admin/settings:
    get:
      operationId: getSettings
      tags: [admin]
      summary: Get store settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"
    patch:
      operationId: updateSettings
      tags: [admin]
      summary: Update store settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"

  # ── STORAGE ───────────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── CATEGORY ──────────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        productCount:
          type: integer

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    # ── PRODUCT ───────────────────────────────────────────────────────────────
    ProductImage:
      type: object
      required: [id, productId, url, isPrimary, displayOrder]
      properties:
        id:
          type: integer
        productId:
          type: integer
        url:
          type: string
        isPrimary:
          type: boolean
        displayOrder:
          type: integer

    ProductVariant:
      type: object
      required: [id, productId, name, value, priceModifier, stockQuantity]
      properties:
        id:
          type: integer
        productId:
          type: integer
        name:
          type: string
        value:
          type: string
        priceModifier:
          type: number
        stockQuantity:
          type: integer

    Product:
      type: object
      required: [id, name, slug, price, description, categoryId, isFeatured, isActive, stockQuantity, images, variants]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
        compareAtPrice:
          type: ["number", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        stockQuantity:
          type: integer
        lowStockThreshold:
          type: integer
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        createdAt:
          type: string

    ProductListResponse:
      type: object
      required: [products, total]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer

    ProductInput:
      type: object
      required: [name, slug, price, description]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
        compareAtPrice:
          type: ["number", "null"]
        categoryId:
          type: ["integer", "null"]
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        stockQuantity:
          type: integer
        lowStockThreshold:
          type: integer

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
        compareAtPrice:
          type: ["number", "null"]
        categoryId:
          type: ["integer", "null"]
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        stockQuantity:
          type: integer
        lowStockThreshold:
          type: integer

    ProductImageInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
        isPrimary:
          type: boolean
        displayOrder:
          type: integer

    # ── INVENTORY ─────────────────────────────────────────────────────────────
    Inventory:
      type: object
      required: [productId, stockQuantity, lowStockThreshold]
      properties:
        productId:
          type: integer
        stockQuantity:
          type: integer
        lowStockThreshold:
          type: integer

    InventoryUpdate:
      type: object
      required: [stockQuantity]
      properties:
        stockQuantity:
          type: integer
        lowStockThreshold:
          type: integer

    InventoryItem:
      type: object
      required: [productId, productName, stockQuantity, lowStockThreshold, isLowStock]
      properties:
        productId:
          type: integer
        productName:
          type: string
        stockQuantity:
          type: integer
        lowStockThreshold:
          type: integer
        isLowStock:
          type: boolean

    LowStockItem:
      type: object
      required: [productId, productName, stockQuantity, lowStockThreshold]
      properties:
        productId:
          type: integer
        productName:
          type: string
        stockQuantity:
          type: integer
        lowStockThreshold:
          type: integer

    # ── CART ──────────────────────────────────────────────────────────────────
    CartItem:
      type: object
      required: [id, sessionId, productId, productName, price, quantity, imageUrl]
      properties:
        id:
          type: integer
        sessionId:
          type: string
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
        quantity:
          type: integer
        imageUrl:
          type: ["string", "null"]
        variantId:
          type: ["integer", "null"]
        variantLabel:
          type: ["string", "null"]

    Cart:
      type: object
      required: [sessionId, items, total, itemCount]
      properties:
        sessionId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
        itemCount:
          type: integer

    CartItemInput:
      type: object
      required: [sessionId, productId, quantity]
      properties:
        sessionId:
          type: string
        productId:
          type: integer
        quantity:
          type: integer
        variantId:
          type: ["integer", "null"]

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer

    # ── ORDER ─────────────────────────────────────────────────────────────────
    OrderItem:
      type: object
      required: [id, orderId, productId, productName, quantity, price, imageUrl]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        variantLabel:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, orderNumber, status, customerName, customerPhone, customerEmail, shippingAddress, items, subtotal, total, createdAt]
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        shippingAddress:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        subtotal:
          type: number
        shippingCost:
          type: number
        total:
          type: number
        paymentMethod:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    OrderListResponse:
      type: object
      required: [orders, total]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer

    OrderInput:
      type: object
      required: [sessionId, customerName, customerPhone, customerEmail, shippingAddress, city, state, pincode]
      properties:
        sessionId:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        shippingAddress:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        notes:
          type: ["string", "null"]
        paymentMethod:
          type: string

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]

    # ── ADMIN DASHBOARD ───────────────────────────────────────────────────────
    AdminDashboard:
      type: object
      required: [todayOrders, todayRevenue, totalOrders, totalRevenue, lowStockCount, recentOrders, ordersByStatus]
      properties:
        todayOrders:
          type: integer
        todayRevenue:
          type: number
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        lowStockCount:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        ordersByStatus:
          type: array
          items:
            $ref: "#/components/schemas/OrderStatusCount"

    OrderStatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    # ── SETTINGS ──────────────────────────────────────────────────────────────
    StoreSettings:
      type: object
      required: [id, storeName, adminWhatsapp]
      properties:
        id:
          type: integer
        storeName:
          type: string
        adminWhatsapp:
          type: string
        newOrderTemplate:
          type: string
        statusUpdateTemplate:
          type: string

    StoreSettingsUpdate:
      type: object
      properties:
        storeName:
          type: string
        adminWhatsapp:
          type: string
        newOrderTemplate:
          type: string
        statusUpdateTemplate:
          type: string

    # ── STORAGE ───────────────────────────────────────────────────────────────
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
